name: マージゲート

on: [push, pull_request]

permissions:
  contents: read

jobs:
  checks:
    name: 全チェック
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4
      - name: GodotとGUTを準備
        run: bash tools/setup.sh
      - name: テストと依存規則を検査
        run: bash tools/checks.sh
